name: Build JOSS Paper

on:
  push:
    branches:
      - paper-joss
    paths:
      - "paper/paper.md"
      - "paper/paper.bib"
      - "paper/Makefile"
      - "paper/img/**"
      - ".github/workflows/build-joss-paper.yml"
  pull_request:
    branches:
      - paper-joss
    paths:
      - "paper/paper.md"
      - "paper/paper.bib"
      - "paper/Makefile"
      - "paper/img/**"
      - ".github/workflows/build-joss-paper.yml"
  workflow_dispatch:

jobs:
  build-paper:
    name: Build JOSS Paper
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build paper PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Create paper/draft-pdf directory
        run: mkdir -p paper/draft-pdf

      - name: Copy PDF to paper/draft-pdf folder
        run: cp paper/paper.pdf paper/draft-pdf/paper.pdf

      - name: Add timestamp to force update detection
        run: |
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" > paper/draft-pdf/.last-updated

      - name: Upload paper PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-pdf
          path: paper/paper.pdf
          retention-days: 30

      - name: Auto-commit PDF to releases
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update paper.pdf from JOSS build [skip ci]"
          file_pattern: "paper/draft-pdf/*"
          skip_dirty_check: false
          add_options: "--force"

      - name: Upload JATS XML as artifact (if exists)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: joss-paper-jats
          path: paper/paper.jats
          retention-days: 30
          if-no-files-found: ignore

  validate-paper:
    name: Validate Paper Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc biber

      - name: Check required files
        run: |
          echo "Checking JOSS paper files..."

          if [ ! -f "paper/paper.md" ]; then
            echo "Error: paper/paper.md not found!"
            exit 1
          fi
          echo "paper.md found"

          if [ ! -f "paper/paper.bib" ]; then
            echo "Error: paper/paper.bib not found!"
            exit 1
          fi
          echo "paper.bib found"

          if ! grep -q "^title:" paper/paper.md; then
            echo "Error: YAML metadata not found in paper.md!"
            exit 1
          fi
          echo "YAML metadata found"

          REQUIRED_SECTIONS=(
            "Summary"
            "Statement of need"
            "State of the field"
            "Software design"
            "Research impact statement"
            "AI usage disclosure"
          )

          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -q "^# ${section}$" paper/paper.md; then
              echo "Error: '# ${section}' section not found"
              exit 1
            fi
            echo "# ${section} found"
          done

          echo ""
          echo "Basic validation passed"

      - name: Check paper length
        run: |
          echo "Checking paper length..."
          WORD_COUNT=$(pandoc paper/paper.md -t plain --strip-comments | wc -w)
          echo "Word count: $WORD_COUNT"

          if [ $WORD_COUNT -lt 750 ]; then
            echo "Error: Paper is below the JOSS minimum of 750 words"
            exit 1
          elif [ $WORD_COUNT -gt 1750 ]; then
            echo "Error: Paper is above the JOSS maximum of 1750 words"
            exit 1
          else
            echo "Word count is within the JOSS range (750-1750)"
          fi

      - name: Validate BibTeX
        run: |
          echo "Validating BibTeX file..."
          if command -v biber &> /dev/null; then
            biber --tool --validate-datamodel paper/paper.bib
          else
            echo "Biber not available, skipping BibTeX validation"
          fi

      - name: Check DOI fields
        run: |
          echo "Checking DOI fields..."
          if grep -En 'doi[[:space:]]*=[[:space:]]*[{"]https?://(dx[.])?doi[.]org/' paper/paper.bib; then
            echo "Error: DOI fields must contain DOI identifiers, not https://doi.org/ URLs"
            exit 1
          fi
          echo "DOI fields look valid"
